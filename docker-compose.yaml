services:
  backend:
    image: jobmathenge/ot-sec-platform-backend:latest
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////app/data/ot_assets.db
      - DEBUG=False
    volumes:
      - aeon_assets_db:/app/data
    networks:
      - aeon-net

  frontend:
    image: jobmathenge/ot-sec-platform-frontend:latest
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend:8001
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:3000/api
    depends_on:
      - backend
    networks:
      - aeon-net

networks:
  aeon-net:
    driver: bridge

volumes:
  aeon_assets_db:
